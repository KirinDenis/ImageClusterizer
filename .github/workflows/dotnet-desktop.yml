name: Build

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]          # ← добавь чтобы Release срабатывал на теги
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Download ONNX model
      run: |
        curl -L -o ImageClusterizer/ImageClusterizer_WPF/resnet50-v2-7.onnx `
          "https://github.com/onnx/models/raw/main/validated/vision/classification/resnet/model/resnet50-v2-7.onnx"

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore
      run: dotnet restore ImageClusterizer/ImageClusterizer.sln

    - name: Publish
      run: dotnet publish ImageClusterizer/ImageClusterizer_WPF/ImageClusterizer_WPF.csproj -c Release -r win-x64 --self-contained false -p:PublishReadyToRun=false -p:PublishTrimmed=false -o ./publish

    - name: Zip artifact
      run: Compress-Archive -Path ./publish/* -DestinationPath ImageClusterizer.zip

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ImageClusterizer-Release
        path: ImageClusterizer.zip

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: ImageClusterizer.zip
