name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore
      run: dotnet restore ImageClusterizer/ImageClusterizer.sln

    - name: Build
      run: dotnet build ImageClusterizer/ImageClusterizer/ImageClusterizer.csproj --configuration Release -p:Platform=x64 -p:PublishReadyToRun=false -p:SelfContained=false

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ImageClusterizer-Release
        path: ImageClusterizer/ImageClusterizer/bin/x64/Release/
